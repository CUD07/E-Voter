<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduVote – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="css/landing-page.css">
</head>
<body class="lp-body">

  <!-- Navbar -->
  <nav class="lp-navbar">
    <a href="landing-page.html" class="lp-nav-brand">
      <span class="material-icons lp-brand-icon">account_balance</span>
      <span class="lp-brand-name">EduVote</span>
    </a>
    <div class="lp-nav-links">
      <a href="landing-page.html" class="lp-nav-link active" id="nav-trend">Trend</a>
      <a href="ballot-page.html" class="lp-nav-link" id="nav-ballot">Ballot</a>
      <a href="voter-dashboard.html" class="lp-nav-link" id="nav-profile">Profile</a>
    </div>
  </nav>

  <!-- Layout -->
  <div class="lp-layout">
    
    <!-- Main Content -->
    <main class="lp-main">
      <h2 class="section-title">Presidential Candidates</h2>
      
      <div class="grid-2">
        <!-- Candidate 1 (Top Candidate) -->
        <div class="candidate-card">
          <div class="cand-img-wrap">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=600&q=80" alt="Elena Rodriguez">
          </div>
          <div class="cand-body">
            <div class="cand-header">
              <h3 class="cand-name">Elena Rodriguez</h3>
              <span class="cand-percent">42%</span>
            </div>
            <button class="btn-campaign btn-campaign-solid" onclick="window.location.href='ballot-page.html'">View Ballot</button>
          </div>
        </div>

        <!-- Other Candidates Column -->
        <div class="other-candidates-column" style="display: flex; flex-direction: column; gap: 1rem;">
          <!-- Candidate 2 -->
          <div class="vp-card" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 12px; background: #ffffff; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=600&q=80" alt="Marcus Chen" class="vp-avatar" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
            <div class="vp-info" style="flex: 1;">
              <h4 style="margin: 0; font-size: 1.1rem; color: #0f172a;">Marcus Chen</h4>
            </div>
            <div class="cand-percent" style="font-weight: 700; font-size: 1.2rem; color: #0f172a;">
              38%
            </div>
          </div>

          <!-- Candidate 3 -->
          <div class="vp-card" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 12px; background: #ffffff; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
            <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=600&q=80" alt="Jordan Smith" class="vp-avatar" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
            <div class="vp-info" style="flex: 1;">
              <h4 style="margin: 0; font-size: 1.1rem; color: #0f172a;">Jordan Smith</h4>
            </div>
            <div class="cand-percent" style="font-weight: 700; font-size: 1.2rem; color: #0f172a;">
              20%
            </div>
          </div>
        </div>
      </div>

      <h2 class="section-title" style="margin-top: 1rem;">Vice Presidential Candidates</h2>
      
      <div class="grid-2">
        <!-- VP 1 (Top Candidate) -->
        <div class="candidate-card">
          <div class="cand-img-wrap">
            <img src="https://i.pravatar.cc/150?img=68" alt="Sam Wilson">
          </div>
          <div class="cand-body">
            <div class="cand-header">
              <h3 class="cand-name">Sam Wilson</h3>
              <span class="cand-percent">40%</span>
            </div>
            <button class="btn-campaign btn-campaign-solid" onclick="window.location.href='ballot-page.html'">View Ballot</button>
          </div>
        </div>

        <!-- Other VP Candidates Column -->
        <div class="other-candidates-column" style="display: flex; flex-direction: column; gap: 1rem;">
          <!-- VP 2 -->
          <div class="vp-card" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 12px; background: #ffffff; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
            <img src="https://i.pravatar.cc/150?img=53" alt="Aria Patel" class="vp-avatar" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
            <div class="vp-info" style="flex: 1;">
              <h4 style="margin: 0; font-size: 1.1rem; color: #0f172a;">Aria Patel</h4>
            </div>
            <div class="cand-percent" style="font-weight: 700; font-size: 1.2rem; color: #0f172a;">
              30%
            </div>
          </div>

          <!-- VP 3 -->
          <div class="vp-card" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 12px; background: #ffffff; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
            <img src="https://i.pravatar.cc/150?img=15" alt="David Okafor" class="vp-avatar" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
            <div class="vp-info" style="flex: 1;">
              <h4 style="margin: 0; font-size: 1.1rem; color: #0f172a;">David Okafor</h4>
            </div>
            <div class="cand-percent" style="font-weight: 700; font-size: 1.2rem; color: #0f172a;">
              18%
            </div>
          </div>

          <!-- VP 4 -->
          <div class="vp-card" style="box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 12px; background: #ffffff; padding: 1rem; display: flex; align-items: center; gap: 1rem;">
            <img src="https://i.pravatar.cc/150?img=47" alt="Chloe Wang" class="vp-avatar" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
            <div class="vp-info" style="flex: 1;">
              <h4 style="margin: 0; font-size: 1.1rem; color: #0f172a;">Chloe Wang</h4>
            </div>
            <div class="cand-percent" style="font-weight: 700; font-size: 1.2rem; color: #0f172a;">
              12%
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/landing-page.js"></script>
</body>
</html>
